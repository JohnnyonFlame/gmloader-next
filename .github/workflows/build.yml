name: gmloader-Next Build

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**/README.md'

jobs:
  build-no-video:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [bullseye, bookworm]

    container:
      image: debian:${{ matrix.distro }}

    name: Debian ${{ matrix.distro }} (No Video)

    steps:
      - name: Install Git
        run: apt update && apt install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies and build (No Video)
        run: |
          dpkg --add-architecture arm64
          apt update

          # Set LLVM and GCC versions per distro
          case "${{ matrix.distro }}" in
            bullseye)
              LLVM_VER=11
              GCC_VER=10
              PYCLANG=python3-clang-11
              ;;
            bookworm)
              LLVM_VER=14
              GCC_VER=11
              PYCLANG=python3-clang-14
              ;;
          esac

          # Install system dependencies
          apt install -y python3 build-essential binutils $PYCLANG libclang-${LLVM_VER}-dev \
            make gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libsdl2-dev:arm64 libzip-dev:arm64 ca-certificates

          # Set LLVM_FILE and LLVM_INC for Makefile
          LLVM_FILE=/usr/lib/llvm-${LLVM_VER}/lib/libclang-${LLVM_VER}.so
          LLVM_INC=/usr/aarch64-linux-gnu/include/c++/${GCC_VER}/aarch64-linux-gnu

          make -f Makefile.gmloader ARCH=aarch64-linux-gnu LLVM_FILE=$LLVM_FILE LLVM_INC=$LLVM_INC -j$(nproc)

      - name: Upload Artifacts (No Video)
        uses: actions/upload-artifact@v4
        with:
          name: gmloadernext_${{ matrix.distro }}_no-video
          path: ${{ github.workspace }}/build/aarch64-linux-gnu/gmloader/gmloadernext.aarch64

  build-video:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [bullseye, bookworm]

    container:
      image: debian:${{ matrix.distro }}

    name: Debian ${{ matrix.distro }} (Video Support)

    steps:
      - name: Install Git
        run: apt update && apt install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies and build (Video)
        run: |
          dpkg --add-architecture arm64
          apt update

          case "${{ matrix.distro }}" in
            bullseye)
              LLVM_VER=11
              GCC_VER=10
              PYCLANG=python3-clang-11
              ;;
            bookworm)
              LLVM_VER=14
              GCC_VER=11
              PYCLANG=python3-clang-14
              ;;
          esac

          apt install -y python3 build-essential binutils $PYCLANG libclang-${LLVM_VER}-dev \
            make gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libsdl2-dev:arm64 libzip-dev:arm64 \
            libavformat-dev:arm64 libavcodec-dev:arm64 libswscale-dev:arm64 \
            libavutil-dev:arm64 libass-dev:arm64 ca-certificates

          LLVM_FILE=/usr/lib/llvm-${LLVM_VER}/lib/libclang-${LLVM_VER}.so
          LLVM_INC=/usr/aarch64-linux-gnu/include/c++/${GCC_VER}/aarch64-linux-gnu

          make -f Makefile.gmloader ARCH=aarch64-linux-gnu VIDEO_SUPPORT=1 LLVM_FILE=$LLVM_FILE LLVM_INC=$LLVM_INC -j$(nproc)

      - name: Upload Artifacts (Video)
        uses: actions/upload-artifact@v4
        with:
          name: gmloadernext_${{ matrix.distro }}_video
          path: ${{ github.workspace }}/build/aarch64-linux-gnu/gmloader/gmloadernext.aarch64
